<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Assistant Dashboard</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- ChartJS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glass-container">
    <!-- Header -->
    <header class="app-header">
      <div class="user-profile">
        <div id="user-avatar" class="avatar">N</div>
        <div>
          <h1 id="user-name">Nexus Dashboard</h1>
          <p class="subtitle" id="connection-status">Connecting to secure storage...</p>
        </div>
      </div>
    </header>

    <!-- Tab Bar Navigation -->
    <nav class="tab-nav">
      <button class="tab-btn active" id="tab-btn-expenses" onclick="switchTab('expenses')">
        <span class="icon">📊</span> Expenses
      </button>
      <button class="tab-btn" id="tab-btn-notes" onclick="switchTab('notes')">
        <span class="icon">📝</span> Research Notes
      </button>
    </nav>

    <!-- Tab Contents -->
    <main class="tab-content">
      <!-- Tab 1: Expenses -->
      <section id="tab-expenses" class="tab-panel active">
        <!-- Quick Stats Cards -->
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">Total Expensed</span>
            <span class="stat-value" id="total-amount">$0.00</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Transactions</span>
            <span class="stat-value" id="total-count">0</span>
          </div>
        </div>

        <!-- Chart -->
        <div class="chart-container glass-card">
          <h3>Category Breakdown</h3>
          <div class="canvas-wrapper">
            <canvas id="categoryChart"></canvas>
          </div>
        </div>

        <!-- Add Expense Trigger -->
        <button class="action-btn" onclick="toggleForm('expense-form-wrapper')">
          + Add New Expense
        </button>

        <!-- Dynamic Add Expense Form -->
        <div id="expense-form-wrapper" class="form-wrapper hidden glass-card">
          <h3>New Expense</h3>
          <form id="expense-form" onsubmit="submitExpense(event)">
            <div class="form-group">
              <label for="exp-amount">Amount ($)</label>
              <input type="number" step="0.01" id="exp-amount" required placeholder="0.00">
            </div>
            <div class="form-group">
              <label for="exp-category">Category</label>
              <select id="exp-category" required>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Others">Others</option>
              </select>
            </div>
            <div class="form-group">
              <label for="exp-desc">Description</label>
              <input type="text" id="exp-desc" required placeholder="Subway, Uber, Electricity...">
            </div>
            <div class="form-actions">
              <button type="submit" class="submit-btn">Save</button>
              <button type="button" class="cancel-btn" onclick="toggleForm('expense-form-wrapper')">Cancel</button>
            </div>
          </form>
        </div>

        <!-- Expense Transactions List -->
        <div class="list-section">
          <h3>Recent Transactions</h3>
          <div class="list-container" id="expense-list">
            <p class="placeholder-text">No expenses logged yet.</p>
          </div>
        </div>
      </section>

      <!-- Tab 2: Research Notes -->
      <section id="tab-notes" class="tab-panel">
        <!-- Add Note Trigger -->
        <button class="action-btn" onclick="toggleForm('note-form-wrapper')">
          + Add New Research Note
        </button>

        <!-- Dynamic Add Note Form -->
        <div id="note-form-wrapper" class="form-wrapper hidden glass-card">
          <h3>New Note</h3>
          <form id="note-form" onsubmit="submitNote(event)">
            <div class="form-group">
              <label for="note-title">Title</label>
              <input type="text" id="note-title" required placeholder="E.g., Quantum Computing Basics">
            </div>
            <div class="form-group">
              <label for="note-content">Content</label>
              <textarea id="note-content" required placeholder="Markdown text or key insights..." rows="5"></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="submit-btn">Save</button>
              <button type="button" class="cancel-btn" onclick="toggleForm('note-form-wrapper')">Cancel</button>
            </div>
          </form>
        </div>

        <!-- Notes Grid List -->
        <div class="list-section">
          <h3>Saved Notes</h3>
          <div class="notes-grid" id="notes-list">
            <p class="placeholder-text">No research notes saved yet.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
