<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Travel Itinerary</title>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-slate-800 mb-6">Catalonia & Barcelona Trip</h1>
        
        <div class="space-y-6">
            <!-- Example Card -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-semibold text-blue-600 mb-4">Oct 24 (Sat) · Besalú & Ripoll</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left text-slate-600">
                        <thead class="text-xs uppercase bg-slate-100">
                            <tr><th class="px-4 py-2">Time</th><th class="px-4 py-2">Activity</th><th class="px-4 py-2">Budget</th></tr>
                        </thead>
                        <tbody>
                            <tr class="border-b">
                                <td class="px-4 py-2 font-medium">09:30</td>
                                <td class="px-4 py-2">Depart Begur → Besalú</td>
                                <td class="px-4 py-2">—</td>
                            </tr>
                            <tr class="border-b">
                                <td class="px-4 py-2 font-medium">10:15</td>
                                <td class="px-4 py-2">Besalú Old Town</td>
                                <td class="px-4 py-2">~€10</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- Add remaining days here -->
        </div>
    </div>
</body>
</html>
